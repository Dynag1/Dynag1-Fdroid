name: build
on: [push, workflow_dispatch]
permissions:
  contents: write
    pages: write
      id-token: write
      jobs:
        build:
            runs-on: ubuntu-latest
                steps:
                      - uses: actions/checkout@v4
                            - name: fdroid
                                    env:
                                              KEYSTORE: ${{ secrets.REPO_KEYSTORE }}
                                                      run: |
                                                                sudo apt update && sudo apt install -y fdroidserver
                                                                          if [ -n "$KEYSTORE" ]; then
                                                                                      echo "$KEYSTORE" | base64 -d > fdroid/keystore.p12
                                                                                                  echo "repo_keyalias: fdroid" >> fdroid/config.yml
                                                                                                              echo "keystorepass: fdroid_password" >> fdroid/config.yml
                                                                                                                          echo "keypass: fdroid_password" >> fdroid/config.yml
                                                                                                                                    fi
                                                                                                                                              mkdir -p fdroid/repo public/fdroid
                                                                                                                                                        cp -r apks/*/* fdroid/repo/ 2>/dev/null || true
                                                                                                                                                                  cd fdroid && fdroid init -d repo && fdroid update -c
                                                                                                                                                                            cd .. && cp -r fdroid/repo public/fdroid/
                                                                                                                                                                                  - uses: actions/configure-pages@v4
                                                                                                                                                                                        - uses: actions/upload-pages-artifact@v3
                                                                                                                                                                                                with:
                                                                                                                                                                                                          path: './public'
                                                                                                                                                                                                            deploy:
                                                                                                                                                                                                                needs: build
                                                                                                                                                                                                                    runs-on: ubuntu-latest
                                                                                                                                                                                                                        environment: github-pages
                                                                                                                                                                                                                            steps:
                                                                                                                                                                                                                                  - uses: actions/deploy-pages@v4
                                                                                                                                                                                                                                  
